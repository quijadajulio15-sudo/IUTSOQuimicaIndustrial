<script>
/*
  Enhancements script:
  - localStorage persistence (key: labEngState)
  - fixes for scramble verify-all
  - matching stores expected mapping and supports verify-all
  - ordering uses drag & drop and verify
  - restore state on load
*/

/* Persistence helpers */
const STORAGE_KEY = 'labEngState_v1';

function saveState(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) { console.warn('Could not save state', e); }
}

function loadState() {
  try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : null; } catch(e){ console.warn('Could not load state', e); return null; }
}

/* General state object builder & saver */
function getCurrentState() {
  const state = { gamesScore: window.gamesScore || 0, matching: null, scramble: null, sentence: null, translation: null, mcq: null, ordering: null, tobe: null };
  // matching
  const matchContainer = document.getElementById('matching-game');
  if (matchContainer && matchContainer.dataset.expected) {
    state.matching = { expected: JSON.parse(matchContainer.dataset.expected), selections: [] };
    const selects = matchContainer.querySelectorAll('select');
    selects.forEach(s => state.matching.selections.push(s.value || ''));
  }
  // scramble
  const scrambleContainer = document.getElementById('scramble-game');
  if (scrambleContainer && scrambleContainer.dataset.expected) {
    state.scramble = { expected: JSON.parse(scrambleContainer.dataset.expected), answers: [] };
    scrambleContainer.querySelectorAll('input').forEach(inp => state.scramble.answers.push(inp.value || ''));
  }
  // sentence
  const sentenceContainer = document.getElementById('sentence-game');
  if (sentenceContainer && sentenceContainer.dataset.answers) {
    state.sentence = { answers: JSON.parse(sentenceContainer.dataset.answers), selections: [] };
    const selects = sentenceContainer.querySelectorAll('button[data-sel]');
    // we track selections separately using window.sentenceSelections if present
    state.sentence.selections = window.sentenceSelections ? {...window.sentenceSelections} : [];
  }
  // translation
  const transContainer = document.getElementById('translation-game');
  if (transContainer && transContainer.dataset.answers) {
    state.translation = { answers: JSON.parse(transContainer.dataset.answers), inputs: [] };
    transContainer.querySelectorAll('input').forEach(inp => state.translation.inputs.push(inp.value || ''));
  }
  // MCQ
  const mcqContainer = document.getElementById('mcq-game');
  if (mcqContainer && mcqContainer.dataset.answers) {
    state.mcq = { answers: JSON.parse(mcqContainer.dataset.answers), selections: window.mcqSelections ? {...window.mcqSelections} : {} };
  }
  // ordering
  const ordContainer = document.getElementById('ordering-game');
  if (ordContainer && ordContainer.dataset.correct) {
    const items = Array.from(ordContainer.querySelectorAll('.ordering-item')).map(div => div.dataset.step || '');
    state.ordering = { correct: JSON.parse(ordContainer.dataset.correct), order: items };
  }
  // ToBe (save inputs from all tobe inputs)
  const tobeInputs = document.querySelectorAll('input[data-expected]');
  if (tobeInputs.length) {
    state.tobe = {};
    tobeInputs.forEach(inp => { state.tobe[inp.id] = { value: inp.value || '', expected: inp.dataset.expected || '' }; });
  }

  state.timestamp = Date.now();
  return state;
}

function persistCurrentState() {
  const state = getCurrentState();
  saveState(state);
}

/* Restore UI from state (best-effort) */
function restoreState() {
  const state = loadState();
  if (!state) return;
  // restore games score
  if (typeof state.gamesScore === 'number') {
    window.gamesScore = state.gamesScore;
    const el = document.getElementById('games-score');
    if (el) el.textContent = window.gamesScore;
    const totalEl = document.getElementById('score-text');
    if (totalEl) totalEl.textContent = parseInt(totalEl.textContent || '0') + window.gamesScore;
  }
  // matching
  if (state.matching && state.matching.expected) {
    // regenerate matching using expected as left order
    const container = document.getElementById('matching-game');
    if (container) {
      container.innerHTML = '';
      const left = state.matching.expected.map(def => {
        // find eng for def if possible by matching original pairs
        // We'll show def on the right; left label show English from matchingPairs if available
        return def;
      });
      // To regenerate exactly as before, call generateMatching but then overwrite expected
      if (typeof generateMatching === 'function') generateMatching();
      // store expected in dataset (if not present)
      container.dataset.expected = JSON.stringify(state.matching.expected);
      // restore selections
      state.matching.selections.forEach((val, i) => {
        const sel = document.getElementById('match-select-'+i);
        if (sel) { sel.value = val; if (val) sel.parentElement.classList.add(val === (JSON.parse(container.dataset.expected)[i]) ? 'bg-green-50' : 'bg-red-50'); sel.disabled = true; }
      });
      document.getElementById('matching-summary').textContent = `Restaurado (${state.matching.selections.filter(s=>s).length}/${state.matching.expected.length})`;
    }
  }
  // scramble
  if (state.scramble && state.scramble.expected) {
    if (typeof generateScramble === 'function') generateScramble();
    const container = document.getElementById('scramble-game');
    container.dataset.expected = JSON.stringify(state.scramble.expected);
    state.scramble.answers.forEach((ans,i) => {
      const inp = document.getElementById('scramble-in-'+i);
      const res = document.getElementById('scramble-res-'+i);
      if (inp) { inp.value = ans; // verify if matches expected
        const expected = state.scramble.expected[i] || '';
        if (ans && ans.trim().toUpperCase() === expected) { res.textContent = '✅'; inp.classList.add('border-green-400','bg-green-50'); inp.disabled = true; }
      }
    });
    document.getElementById('scramble-summary').textContent = 'Restaurado';
  }
  // sentence
  if (state.sentence && state.sentence.answers) {
    if (typeof generateSentence === 'function') generateSentence();
    const container = document.getElementById('sentence-game');
    container.dataset.answers = JSON.stringify(state.sentence.answers);
    if (state.sentence.selections) {
      window.sentenceSelections = {...state.sentence.selections};
      Object.entries(window.sentenceSelections).forEach(([idx,val])=>{
        const res = document.getElementById('sentence-res-'+idx);
        if (res) { res.textContent = (val === state.sentence.answers[idx]) ? '✅' : `❌ ${state.sentence.answers[idx]}`; const parent = container.children[idx]; if (parent) parent.querySelectorAll('button').forEach(b=>b.disabled=true); }
      });
    }
    document.getElementById('sentence-summary').textContent = 'Restaurado';
  }
  // translation
  if (state.translation && state.translation.answers) {
    if (typeof generateTranslation === 'function') generateTranslation();
    const container = document.getElementById('translation-game');
    container.dataset.answers = JSON.stringify(state.translation.answers);
    state.translation.inputs.forEach((val,i)=>{
      const inp = document.getElementById('trans-in-'+i);
      const res = document.getElementById('trans-res-'+i);
      if (inp) { inp.value = val; const correct = state.translation.answers[i]; if (val.trim().toLowerCase() === (correct||'').toLowerCase()) { res.textContent='✅'; inp.classList.add('border-green-400','bg-green-50'); } }
    });
    document.getElementById('translation-summary').textContent = 'Restaurado';
  }
  // mcq
  if (state.mcq && state.mcq.answers) {
    if (typeof generateMCQ === 'function') generateMCQ();
    window.mcqSelections = {...(state.mcq.selections||{})};
    // mark selections UI (best-effort)
    const container = document.getElementById('mcq-game');
    if (container) {
      container.querySelectorAll('div').forEach((div,i)=>{
        const sel = window.mcqSelections && window.mcqSelections[i];
        if (typeof sel !== 'undefined') {
          // disable buttons and highlight chosen
          div.querySelectorAll('button').forEach(b => b.disabled = true);
          const res = document.getElementById('mcq-res-'+i);
          if (res) res.textContent = (sel === JSON.parse(container.dataset.answers||'[]')[i]) ? '✅' : '❌';
        }
      });
    }
    document.getElementById('mcq-summary').textContent = 'Restaurado';
  }
  // ordering
  if (state.ordering && state.ordering.correct) {
    // regenerate ordering and then set item order if possible
    if (typeof generateOrdering === 'function') generateOrdering();
    const container = document.getElementById('ordering-game');
    // if ordering UI uses draggable items with class ordering-item, we attempt to reorder them according to state.ordering.order
    if (state.ordering.order && state.ordering.order.length) {
      // try to place items in that order (best-effort)
      const items = Array.from(container.querySelectorAll('.ordering-item'));
      if (items.length) {
        // build map text->element
        const map = {};
        items.forEach(it => map[it.dataset.step] = it);
        container.innerHTML = '';
        state.ordering.order.forEach(stepText => {
          if (map[stepText]) container.appendChild(map[stepText]);
        });
        document.getElementById('ordering-summary').textContent = 'Restaurado';
      }
    }
  }
  // tobe inputs
  if (state.tobe) {
    Object.entries(state.tobe).forEach(([id,obj])=>{
      const input = document.getElementById(id);
      if (input) { input.value = obj.value || ''; if (obj.value) { const res = document.getElementById(id+'-res'); if (res) { res.textContent = (obj.value.toLowerCase().trim() === (obj.expected||'').toLowerCase()) ? '✅' : `❌ ${(obj.expected||'')}`; } } }
    });
  }

  // done
}

/* Hook persistence to major actions:
   - After generate functions run, we save the expected arrays as dataset.* and call persistCurrentState
   - After verify functions run, we persist state
*/

/* Fix/augment generateMatching to store expected mapping reliably (overwrites previous if existed) */
function generateMatching(){
  // draw a set of pairs (use matchingPairs if present globally)
  const pairs = window.matchingPairs || [
    {eng:'Acid', def:'pH < 7'},{eng:'Base', def:'pH > 7'},{eng:'Molecule', def:'Two or more atoms bonded'},
    {eng:'Reaction', def:'Transformation of substances'},{eng:'Solvent', def:'Liquid that dissolves a solute'},{eng:'Catalyst', def:'Speeds up a reaction without being consumed'},
    {eng:'Distillation', def:'Separation by boiling point'},{eng:'Filtration', def:'Separation of solids from liquids'},{eng:'Reactor', def:'Vessel for chemical reactions'},{eng:'Oxidation', def:'Loss of electrons'}
  ];
  const left = pairs.map(p => p.eng).sort(()=>Math.random()-0.5).slice(0,6);
  const rightPool = pairs.filter(p=> left.includes(p.eng) ? false : true).concat(pairs.filter(p=> left.includes(p.eng))); // ensure pool contains defs
  const right = left.map(l => pairs.find(p => p.eng === l).def).sort(()=>Math.random()-0.5);

  const container = document.getElementById('matching-game');
  container.innerHTML = '';
  left.forEach((eng,i)=>{
    const div = document.createElement('div');
    div.className = 'flex items-center justify-between gap-4 bg-white p-3 rounded-lg';
    div.innerHTML = `<div class="font-semibold">${eng}</div>
      <select id="match-select-${i}" class="px-2 py-1" aria-label="Emparejar para ${eng}">
        <option value="">Selecciona...</option>
        ${right.map(r=>`<option value="${r}">${r}</option>`).join('')}
      </select>`;
    container.appendChild(div);
  });
  // store expected mapping (in same left order)
  const expected = left.map(l => pairs.find(p => p.eng === l).def);
  container.dataset.expected = JSON.stringify(expected);
  document.getElementById('matching-summary').textContent = '';
  persistCurrentState();
}

/* verifyMatchingAll: uses dataset.expected */
function verifyMatchingAll(){
  const container = document.getElementById('matching-game');
  if (!container || !container.dataset.expected) return;
  const expected = JSON.parse(container.dataset.expected);
  let correct = 0;
  expected.forEach((exp, i)=>{
    const sel = document.getElementById('match-select-'+i);
    if(!sel) return;
    const val = sel.value || '';
    if (val === exp) {
      sel.parentElement.classList.add('bg-green-50');
      correct++;
      updateGamesScore(2);
    } else {
      sel.parentElement.classList.add('bg-red-50');
      if (val) {
        // highlight correct option
        for (let opt of sel.options) { if (opt.value === exp) opt.style.fontWeight = '700'; }
      }
    }
    sel.disabled = true;
  });
  document.getElementById('matching-summary').textContent = `Resultado: ${correct}/${expected.length}`;
  persistCurrentState();
}

/* Scramble: generate and store expected words on dataset; allow verify-all */
function generateScramble(){
  const words = window.scrambleWords || ['ACID','WATER','MOLECULE','REACTION','SOLVENT','CATALYST','DISTILLATION','FILTRATION','REACTOR','OXIDATION'];
  const selected = words.sort(()=>Math.random()-0.5).slice(0,5);
  const container = document.getElementById('scramble-game');
  container.innerHTML = '';
  container.dataset.expected = JSON.stringify(selected);
  selected.forEach((w,i) => {
    const scrambled = w.split('').sort(()=>Math.random()-0.5).join('');
    const div = document.createElement('div');
    div.className = 'bg-white p-3 rounded-lg';
    div.innerHTML = `<div class="font-medium">${scrambled}</div>
      <div class="mt-2 flex gap-2">
        <input id="scramble-in-${i}" type="text" aria-label="Respuesta scrambled ${i}" class="flex-1" placeholder="Escribe la palabra">
        <button class="btn small btn-ghost" onclick="checkScrambleSingle(${i}, '${w}')">Verificar</button>
      </div>
      <div id="scramble-res-${i}" class="mt-2 text-sm font-medium"></div>`;
    container.appendChild(div);
  });
  document.getElementById('scramble-summary').textContent = '';
  persistCurrentState();
}

function checkScrambleSingle(i, correct){
  const inp = document.getElementById('scramble-in-'+i);
  const res = document.getElementById('scramble-res-'+i);
  if (!inp) return;
  const val = (inp.value || '').trim().toUpperCase();
  if (val === correct) {
    res.textContent = '✅ Correct';
    inp.classList.add('border-green-400','bg-green-50');
    updateGamesScore(3);
  } else {
    res.textContent = `❌ ${correct}`;
    inp.classList.add('border-red-400','bg-red-50');
  }
  inp.disabled = true;
  persistCurrentState();
}

function verifyScrambleAll(){
  const container = document.getElementById('scramble-game');
  if (!container || !container.dataset.expected) return;
  const expected = JSON.parse(container.dataset.expected);
  let correct=0;
  expected.forEach((word,i)=>{
    const inp = document.getElementById('scramble-in-'+i);
    const res = document.getElementById('scramble-res-'+i);
    if (!inp) return;
    const val = (inp.value || '').trim().toUpperCase();
    if (val === word) {
      if (!res.textContent.includes('✅')) updateGamesScore(3);
      res.textContent = '✅ Correct';
      inp.classList.add('border-green-400','bg-green-50');
      correct++;
    } else {
      res.textContent = `❌ ${word}`;
      inp.classList.add('border-red-400','bg-red-50');
    }
    inp.disabled = true;
  });
  document.getElementById('scramble-summary').textContent = `Resultado: ${correct}/${expected.length}`;
  persistCurrentState();
}

/* Ordering: implement drag & drop ordering UI */
function generateOrdering(){
  const examples = window.orderingExamples || [
    {title:'Procedure: pH test', steps:['Collect sample','Add indicator','Compare with chart','Record pH']},
    {title:'Safety check', steps:['Wear PPE','Check valves closed','Verify alarms','Obtain permit']}
  ];
  const ex = examples[Math.floor(Math.random()*examples.length)];
  const container = document.getElementById('ordering-game');
  container.innerHTML = `<div class="font-semibold">${ex.title}</div>`;
  const steps = ex.steps.slice();
  const shuffled = steps.sort(()=>Math.random()-0.5);
  const list = document.createElement('ul');
  list.className = 'mt-3 space-y-2';
  shuffled.forEach((step,i)=>{
    const li = document.createElement('li');
    li.className = 'ordering-item bg-white p-3 rounded-lg flex items-center gap-3';
    li.draggable = true;
    li.dataset.step = step;
    li.id = 'order-item-' + i;
    li.innerHTML = `<span class="drag-handle" aria-hidden="true">☰</span><div class="flex-1">${step}</div>`;
    // drag events
    li.addEventListener('dragstart', (e) => { li.classList.add('opacity-60'); e.dataTransfer.setData('text/plain', li.id); });
    li.addEventListener('dragend', () => li.classList.remove('opacity-60'));
    list.appendChild(li);
  });
  // allow drop reordering
  list.addEventListener('dragover', e => { e.preventDefault(); const after = getDragAfterElement(list, e.clientY); list.style.border = '1px dashed #e2e8f0'; });
  list.addEventListener('dragleave', e => list.style.border = 'none');
  list.addEventListener('drop', e => {
    e.preventDefault();
    const id = e.dataTransfer.getData('text/plain');
    const dragged = document.getElementById(id);
    if (!dragged) return;
    const after = getDragAfterElement(list, e.clientY);
    if (after == null) list.appendChild(dragged);
    else list.insertBefore(dragged, after);
    list.style.border = 'none';
    persistCurrentState();
  });
  container.appendChild(list);
  // store correct mapping and persist
  container.dataset.correct = JSON.stringify(ex.steps);
  document.getElementById('ordering-summary').textContent = '';
  persistCurrentState();
}
function getDragAfterElement(container, y) {
  const draggableElements = [...container.querySelectorAll('.ordering-item:not(.dragging)')];
  return draggableElements.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if (offset < 0 && offset > closest.offset) {
      return { offset: offset, element: child };
    } else {
      return closest;
    }
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}
function verifyOrdering(){
  const container = document.getElementById('ordering-game');
  if (!container || !container.dataset.correct) { document.getElementById('ordering-summary').textContent = 'Genera primero el ejercicio.'; return; }
  const correct = JSON.parse(container.dataset.correct);
  const current = Array.from(container.querySelectorAll('.ordering-item')).map(it => it.dataset.step);
  let score = 0;
  for (let i=0;i<correct.length;i++){
    if (current[i] === correct[i]) score++;
  }
  updateGamesScore(score * 2);
  document.getElementById('ordering-summary').textContent = `Resultado: ${score}/${correct.length}`;
  // lock drag
  container.querySelectorAll('.ordering-item').forEach(it => { it.draggable = false; });
  persistCurrentState();
}

/* Hook to save state on window unload */
window.addEventListener('beforeunload', persistCurrentState);

/* Restore saved state on load */
document.addEventListener('DOMContentLoaded', () => {
  // call existing initializers if present (generate matching/scramble etc.)
  try {
    if (typeof generateMatching === 'function') generateMatching();
    if (typeof generateScramble === 'function') generateScramble();
    if (typeof generateSentence === 'function') generateSentence();
    if (typeof generateTranslation === 'function') generateTranslation();
    if (typeof generateMCQ === 'function') generateMCQ();
  } catch(e){ /* ignore */ }
  // load saved state and attempt to restore UI
  restoreState();
});

/* Utility: small wrapper to ensure save after key actions */
const orig_updateGamesScore = window.updateGamesScore;
window.updateGamesScore = function(delta){
  if (typeof orig_updateGamesScore === 'function') orig_updateGamesScore(delta);
  saveState(getCurrentState());
};

</script>
